<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h2>MemeFocus</h2>
      <span id="badge" class="badge off">Off</span>
    </div>
    
    <div class="status-box">
      <p id="status-text">Timer is not running.</p>
      <div id="countdown" class="countdown">00:00</div>
    </div>
    
    <div class="actions">
      <button id="open-app" class="btn btn-primary">Open Dashboard</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
